        /* Mobile-First CSS Structure */
        body { margin: 0; overflow: hidden; font-family: 'Open Sans', 'Roboto', Arial, sans-serif; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; -webkit-font-smoothing: antialiased; background: radial-gradient(circle, #2a1f1a 0%, #101010 100%); color: #f5e8da;}

        /* Mobile Glass UI Panels (Touch optimized) */
        .glass-panel { background: rgba(30, 20, 15, 0.85); backdrop-filter: blur(8px); border-radius: 12px; border: 1px solid rgba(245, 232, 218, 0.2); box-shadow: 0 4px 16px rgba(0,0,0,0.6); z-index: 10; pointer-events: auto; }

        /* Left-pinned Collapsible Control Panel */
        #control-panel { position: absolute; top: 10px; left: 10px; padding: 15px; width: calc(100% - 40px); max-width: 320px; max-height: calc(100% - 20px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .controls-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding-bottom: 10px; border-bottom: 1px solid rgba(245, 232, 218, 0.2); margin-bottom: 10px; }
        .controls-title { margin: 0; color: #ff9f43; font-size: 16px; font-weight: 700;}
        .collapse-icon { font-size: 14px; transition: transform 0.3s;}
        .controls-body { display: block; } /* Controlled by JS toggle */

        /* Mobile Interaction Toggles (Thumb-friendly size) */
        .switch-control { display: flex; align-items: center; margin: 10px 0; gap: 10px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #4b3e36; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: #f5e8da; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background-color: #ff9f43; }
        input:checked + .slider:before { transform: translateX(24px); }
        .control-label { font-size: 14px; color: #f5e8da;}

        /* Wing Legend (Mobile friendly size) */
        .legend-list { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(245, 232, 218, 0.3); }
        .classic { background-color: #d35400; } /* Warm orange-brown */
        .signature { background-color: #ff9f43; } /* Vivid fiery core */
        .focal { background-color: #ffffff; box-shadow: 0 0 12px #ff9f43; } /* selected white core */

        /* Contextual Recipe Detail Panel (Touch optimized position) */
        #detail-panel { position: absolute; bottom: 20px; left: 10px; width: calc(100% - 40px); max-width: 340px; padding: 20px; display: none; margin-bottom: 0px; }
        .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .detail-title { font-size: 20px; font-weight: 700; color: #ffffff; margin: 0; text-transform: uppercase; letter-spacing: -0.5px; }
        .close-btn { cursor: pointer; color: #f5e8da; font-size: 24px; }
        .detail-category { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #ff9f43; margin-bottom: 18px; font-weight: 600; }
        .detail-desc { font-size: 14px; color: #f5e8da; line-height: 1.6; border-top: 1px solid rgba(245, 232, 218, 0.2); padding-top: 15px; }

        /* Mobile specific text rendering optimizations */
        strong { font-weight: 700; color: #ffffff; }

    </style>
</head>

        Graph.onFrame(() => {
